name: Site UI Checks

on:
  pull_request:
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "scripts/testing/run_site_ui_checks.sh"
      - "tests/site/**"
      - ".github/workflows/site-ui-checks.yml"
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "scripts/testing/run_site_ui_checks.sh"
      - "tests/site/**"
      - ".github/workflows/site-ui-checks.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  site-ui:
    name: Playwright site UI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright site checks
        run: npm run test:site:ui

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-test-results
          path: test-results/site-ui/
          retention-days: 14
